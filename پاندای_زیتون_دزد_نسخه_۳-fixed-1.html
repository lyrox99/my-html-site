<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>خرپلنگ فضایی - مولتی پلیر آنلاین واقعی</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #04040c; font-family: Arial, sans-serif; }
        .screen {
            position: fixed; width: 100%; height: 100%; background: rgba(6, 3, 15, 0.98);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 50; color: white; padding: 20px; text-align: center;
        }
        h1 { font-size: 2.3rem; color: #ffb703; text-shadow: 0 0 20px rgba(255,183,3,0.7); margin-bottom: 20px; }
        .btn {
            background: linear-gradient(135deg, #ffb703, #fb8500); border: none; color: white;
            padding: 12px 25px; font-size: 1.1rem; font-weight: bold; border-radius: 30px;
            margin: 8px; cursor: pointer; box-shadow: 0 5px 15px rgba(251,133,0,0.4); width: 250px;
        }
        .btn-purple { background: linear-gradient(135deg, #7209b7, #5c0d91); box-shadow: 0 5px 15px rgba(114,9,183,0.4); }
        .btn-back { background: linear-gradient(135deg, #e63946, #9b2226); box-shadow: 0 5px 15px rgba(230,57,70,0.4); }
        .info-box {
            background: rgba(255,255,255,0.06); width: 100%; max-width: 340px;
            padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid rgba(255,255,255,0.15);
        }
        #game-container { position: relative; width: 100%; height: 100%; display: none; }
        canvas { display: block; width: 100%; height: 100%; }
        #ui {
            position: absolute; top: 10px; left: 10px; right: 10px;
            display: flex; justify-content: space-between; color: white; font-size: 1rem;
            pointer-events: none; text-shadow: 1px 1px 5px black;
        }
    </style>
</head>
<body>

    <div id="menu-screen" class="screen">
        <h1>خرپلنگ فضایی آنلاین 🌌</h1>
        <button class="btn" onclick="startSinglePlayer()">🙋‍♂️ بازی تک‌نفره</button>
        <button class="btn btn-purple" onclick="initMultiplayerHost()">👥 ساخت اتاق ۲ نفره آنلاین</button>
        <div id="connection-status" style="margin-top: 15px; color: #aaa; font-size: 0.9rem;">وضعیت شبکه: آماده نبرد</div>
    </div>

    <div id="lobby-screen" class="screen" style="display: none;">
        <h1>اتاق انتظار نبرد</h1>
        <div class="info-box">
            <p style="color:#00f5ff; margin-bottom: 10px;">لینک زیر را کپی کن و برای دوستت در تلگرام بفرست:</p>
            <input type="text" id="invite-link-input" readonly style="width:100%; padding:10px; text-align:center; border-radius:8px; border:none; background:#222; color:#ffd700;">
        </div>
        <button class="btn btn-purple" onclick="copyInviteLink()">📋 کپی کردن لینک دعوت</button>
        <button class="btn btn-back" onclick="location.reload()">لغو و بازگشت</button>
    </div>

    <div id="gameover-screen" class="screen" style="display: none;">
        <h1 style="color: #e63946;">سفینه منفجر شد! 💥</h1>
        <div class="info-box">🪙 امتیاز نهایی تیم: <span id="go-score" style="color:#ffb703; font-weight:bold;">0</span></div>
        <button class="btn" onclick="location.reload()">بازگشت به منو اصلی</button>
    </div>

    <div id="game-container">
        <div id="ui">
            <div>امتیاز تیم: <span id="ui-score">0</span></div>
            <div>وضعیت: <span id="ui-players-hp">در حال نبرد مشترک</span></div>
        </div>
        <canvas id="gameCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let animationFrameId;
        let score = 0, gameActive = false;

        // مشخصات دو بازیکن
        let p1 = { x: 0, y: 0, radius: 18, color: '#ffb703', lastShot: 0 }; // خودت
        let p2 = { x: 0, y: 0, radius: 18, color: '#9d4edd', lastShot: 0, active: false }; // دوستت

        let bullets = []; let enemies = []; let stars = [];

        // متغیرهای شبکه PeerJS
        let peer = null;
        let connection = null;
        let isHost = false;

        // بررسی اینکه آیا کاربر از طریق لینک دعوت وارد شده است یا نه
        const urlParams = new URLSearchParams(window.location.search);
        const roomId = urlParams.get('room');

        if (roomId) {
            // اگر آیدی اتاق در لینک بود، اتوماتیک به عنوان مهمان وصل شو
            document.getElementById('connection-status').innerText = "در حال اتصال به اتاق دوستت...";
            initMultiplayerGuest(roomId);
        }

        // --- بخش شبکه و آنلاین کردن بازی ---

        // حالت ۱: تو اتاق را می‌سازی (Host)
        function initMultiplayerHost() {
            document.getElementById('connection-status').innerText = "در حال ساخت اتاق در سرور شبکه...";
            peer = new Peer(); // ساخت یک آیدی رندوم در شبکه

            peer.on('open', (id) => {
                isHost = true;
                let inviteLink = window.location.origin + window.location.pathname + "?room=" + id;
                document.getElementById('invite-link-input').value = inviteLink;
                document.getElementById('menu-screen').style.display = 'none';
                document.getElementById('lobby-screen').style.display = 'flex';
            });

            // وقتی دوستت به تو وصل می‌شود
            peer.on('connection', (conn) => {
                connection = conn;
                setupConnectionDataListener();
                p2.active = true;
                startTheGame(); // شروع بازی برای هر دو نفر
            });
        }

        // حالت ۲: دوستت روی لینک کلیک کرده و وارد می‌شود (Guest)
        function initMultiplayerGuest(targetRoomId) {
            peer = new Peer();
            peer.on('open', () => {
                connection = peer.connect(targetRoomId); // اتصال مستقیم به گوشی تو
                isHost = false;
                p2.active = true;

                connection.on('open', () => {
                    startTheGame();
                });
                setupConnectionDataListener();
            });
        }

        // گوش دادن به دیتای ارسالی از گوشی مقابل
        function setupConnectionDataListener() {
            connection.on('data', (data) => {
                if (data.type === 'move') {
                    // دریافت موقعیت حریف
                    p2.x = data.x;
                    p2.y = data.y;
                } else if (data.type === 'enemySpawn' && !isHost) {
                    // مهمان دشمنان را از میزبان کپی می‌کند تا هماهنگ باشند
                    enemies.push(data.enemy);
                } else if (data.type === 'scoreUpdate') {
                    score = data.score;
                    document.getElementById('ui-score').innerText = score;
                } else if (data.type === 'gameover') {
                    endGame();
                }
            });
        }

        // کپی کردن لینک دعوت
        function copyInviteLink() {
            let copyText = document.getElementById("invite-link-input");
            copyText.select();
            copyText.setSelectionRange(0, 99999);
            navigator.clipboard.writeText(copyText.value);
            alert("لینک دعوت کپی شد! حالا بفرستش برای دوستت.");
        }

        // --- بخش اصلی موتور بازی ---

        function startSinglePlayer() {
            p2.active = false;
            document.getElementById('menu-screen').style.display = 'none';
            startTheGame();
        }

        function startTheGame() {
            document.getElementById('menu-screen').style.display = 'none';
            document.getElementById('lobby-screen').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';
            
            gameActive = true; score = 0; bullets = []; enemies = []; stars = [];
            
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            p1.x = canvas.width / 2; p1.y = canvas.height * 0.8;
            p2.x = canvas.width / 2; p2.y = canvas.height * 0.8;

            for(let i=0; i<30; i++) stars.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, speed: Math.random()*2+0.5 });

            gameLoop(0);
        }

        // کنترل حرکت سفینه با انگشت و فرستادن پوزیشن به دوستت
        window.addEventListener('touchmove', (e) => {
            if(!gameActive) return;
            let touch = e.touches[0];
            p1.x = touch.clientX; p1.y = touch.clientY - 40;

            // اگر بازی آنلاین است، موقعیت جدیدت را برای دوستت بفرست
            if (connection && connection.open) {
                connection.send({ type: 'move', x: p1.x, y: p1.y });
            }
        }, {passive: false});

        function gameLoop(timestamp) {
            if(!gameActive) return;

            ctx.fillStyle = '#04040c'; ctx.fillRect(0, 0, canvas.width, canvas.height);

            // پس‌زمینه ستاره‌ای
            ctx.fillStyle = 'white';
            stars.forEach(s => { s.y += s.speed; if(s.y > canvas.height) s.y = 0; ctx.fillRect(s.x, s.y, 2, 2); });

            // شلیک اتوماتیک سفینه تو
            if(timestamp - p1.lastShot > 300) {
                bullets.push({ x: p1.x, y: p1.y - 20, color: p1.color }); p1.lastShot = timestamp;
            }

            // حرکت و رسم تیرها
            bullets.forEach((b, index) => {
                b.y -= 8;
                ctx.fillStyle = b.color;
                ctx.fillRect(b.x - 2, b.y, 4, 12);
                if(b.y < 0) bullets.splice(index, 1);
            });

            // تولید دشمنان (فقط میزبان تولید می‌کند تا هر دو گوشی یکسان باشند)
            if (isHost || !p2.active) {
                if(Math.random() < 0.02) {
                    let newEnemy = { x: Math.random()*(canvas.width-40)+20, y: -20, radius: 15, speed: Math.random()*2+2 };
                    enemies.push(newEnemy);
                    // فرستادن دشمن به گوشی دوستت
                    if (connection && connection.open) {
                        connection.send({ type: 'enemySpawn', enemy: newEnemy });
                    }
                }
            }

            // حرکت و پردازش دشمنان
            enemies.forEach((e, eIdx) => {
                e.y += e.speed;
                ctx.fillStyle = '#e63946';
                ctx.beginPath(); ctx.arc(e.x, e.y, e.radius, 0, Math.PI*2); ctx.fill();

                if(e.y > canvas.height) enemies.splice(eIdx, 1);

                // برخورد تیر به دشمن
                bullets.forEach((b, bIdx) => {
                    if(Math.hypot(b.x - e.x, b.y - e.y) < e.radius) {
                        enemies.splice(eIdx, 1); bullets.splice(bIdx, 1);
                        if (!p2.active || isHost) {
                            score += 10;
                            document.getElementById('ui-score').innerText = score;
                            if (connection && connection.open) {
                                connection.send({ type: 'scoreUpdate', score: score });
                            }
                        }
                    }
                });

                // برخورد دشمن به سفینه تو یا دوستت
                if(Math.hypot(p1.x - e.x, p1.y - e.y) < p1.radius + e.radius) {
                    triggerGameOver();
                }
                if(p2.active && Math.hypot(p2.x - e.x, p2.y - e.y) < p2.radius + e.radius) {
                    triggerGameOver();
                }
            });

            // رسم سفینه‌ها
            drawShip(p1.x, p1.y, p1.color);
            if(p2.active) drawShip(p2.x, p2.y, p2.color);

            animationFrameId = requestAnimationFrame(gameLoop);
        }

        function drawShip(x, y, color) {
            ctx.fillStyle = color;
            ctx.beginPath(); ctx.arc(x, y, 18, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#b58253'; // گوش‌های خرپلنگ
            ctx.fillRect(x - 12, y - 25, 5, 12); ctx.fillRect(x + 7, y - 25, 5, 12);
        }

        function triggerGameOver() {
            endGame();
            if (connection && connection.open) {
                connection.send({ type: 'gameover' });
            }
        }

        function endGame() {
            gameActive = false;
            cancelAnimationFrame(animationFrameId);
            document.getElementById('go-score').innerText = score;
            document.getElementById('game-container').style.display = 'none';
            document.getElementById('gameover-screen').style.display = 'flex';
        }
    </script>
</body>
</html>
